version: 2
updates:
  # Keep GitHub Actions versions current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    ignore:
      # Removed in favor of plain rustup shell commands; do not re-introduce.
      - dependency-name: "dtolnay/rust-toolchain"

  # Keep Cargo dependencies current.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
