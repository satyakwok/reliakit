name: Docs

on:
  push:
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest

    env:
      RUSTDOCFLAGS: "-D warnings"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
