name: Release

on:
  push:
    tags:
      # Every crate-specific release tag (`reliakit-<crate>-v<version>`) and the
      # umbrella's own tag (`reliakit-v<version>`).
      - "reliakit-*-v*"
      - "reliakit-v*"

# Least privilege at the top level; the release job opts into the write access
# it needs. This workflow does not publish to crates.io.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    runs-on: ubuntu-latest
    # GitHub release creation requires write access to repository contents.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace --all-features --locked

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag##*-v}"
          crate="${tag%-v*}"
          awk -v crate="$crate" -v ver="$version" '
            index($0, "## " crate " " ver " ") == 1 { flag = 1; next }
            flag && /^## / { flag = 0 }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if ! grep -q "[^[:space:]]" RELEASE_NOTES.md; then
            printf "See [CHANGELOG.md](CHANGELOG.md) for details.\n" > RELEASE_NOTES.md
          fi
          echo "name=$crate $version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: ${{ steps.notes.outputs.name }}
          body_path: RELEASE_NOTES.md
