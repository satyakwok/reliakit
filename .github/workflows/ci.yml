name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify Cargo.lock is up to date
        run: cargo metadata --locked --format-version 1 > /dev/null

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked

      - name: Test
        run: cargo test --workspace --all-features --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  msrv:
    name: MSRV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo check --workspace --all-features --locked

  no-std:
    name: no_std
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check no_std (alloc only)
        run: |
          cargo check -p reliakit-primitives --no-default-features --features alloc --locked
          cargo check -p reliakit-secret --no-default-features --features alloc --locked
          cargo check -p reliakit-validate --no-default-features --features alloc --locked
          cargo check -p reliakit-collections --no-default-features --features alloc --locked
