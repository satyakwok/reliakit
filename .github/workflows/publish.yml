# Publish individual crates to crates.io on version tag push.
# Usage: git tag reliakit-primitives-v0.2.4 && git push origin reliakit-primitives-v0.2.4

name: Publish

on:
  push:
    tags:
      - "reliakit-primitives-v*"
      - "reliakit-secret-v*"
      - "reliakit-validate-v*"
      - "reliakit-collections-v*"

jobs:
  publish-primitives:
    if: startsWith(github.ref, 'refs/tags/reliakit-primitives-v')
    runs-on: ubuntu-latest
    environment: crates-io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test -p reliakit-primitives --all-features

      - name: Publish to crates.io
        run: cargo publish -p reliakit-primitives --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-secret:
    if: startsWith(github.ref, 'refs/tags/reliakit-secret-v')
    runs-on: ubuntu-latest
    environment: crates-io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test -p reliakit-secret --all-features

      - name: Publish to crates.io
        run: cargo publish -p reliakit-secret --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-validate:
    if: startsWith(github.ref, 'refs/tags/reliakit-validate-v')
    runs-on: ubuntu-latest
    environment: crates-io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test -p reliakit-validate --all-features

      - name: Publish to crates.io
        run: cargo publish -p reliakit-validate --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-collections:
    if: startsWith(github.ref, 'refs/tags/reliakit-collections-v')
    runs-on: ubuntu-latest
    environment: crates-io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test -p reliakit-collections --all-features

      - name: Publish to crates.io
        run: cargo publish -p reliakit-collections --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
