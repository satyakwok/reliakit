name: Coverage

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate reliakit-primitives coverage
        run: |
          cargo llvm-cov \
            -p reliakit-primitives \
            --all-features \
            --lcov \
            --output-path lcov-reliakit-primitives.info

      - name: Upload reliakit-primitives coverage
        uses: codecov/codecov-action@v6
        with:
          files: lcov-reliakit-primitives.info
          flags: reliakit-primitives
          name: reliakit-primitives
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate reliakit-secret coverage
        run: |
          cargo llvm-cov \
            -p reliakit-secret \
            --all-features \
            --lcov \
            --output-path lcov-reliakit-secret.info

      - name: Upload reliakit-secret coverage
        uses: codecov/codecov-action@v6
        with:
          files: lcov-reliakit-secret.info
          flags: reliakit-secret
          name: reliakit-secret
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
