# Time-boxed fuzzing of the untrusted-input parsers/decoders. Runs weekly and on
# demand rather than per-PR; the parsers also have deterministic fuzz-style
# tests in the normal CI suite.
name: Fuzz

on:
  schedule:
    - cron: "0 3 * * 1" # Mondays 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        run: |
          rustup toolchain install nightly --profile minimal
          rustup default nightly
          rustc --version

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: ${{ runner.os }}-fuzz-${{ hashFiles('**/Cargo.lock', 'fuzz/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-fuzz-

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Run fuzz targets
        run: |
          for target in json_parse json_roundtrip json_canonical codec_decode; do
            echo "::group::fuzz $target"
            cargo fuzz run "$target" -- -max_total_time=90
            echo "::endgroup::"
          done
